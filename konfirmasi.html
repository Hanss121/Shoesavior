<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konfirmasi Pesanan - Shoesavior</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-[#0b0f19] text-slate-200 min-h-screen flex flex-col custom-scrollbar">

  <nav class="sticky top-0 z-50 glassmorphism border-b border-slate-800/60 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        <a href="index.html" class="flex items-center gap-3 cursor-pointer">
          <div class="p-2.5 bg-gradient-to-tr from-sky-500 to-indigo-600 rounded-xl shadow-lg shadow-sky-500/20">
            <i class="fa-solid fa-shoe-prints text-white text-xl transform -rotate-45"></i>
          </div>
          <span class="text-2xl font-bold tracking-tight text-white">
            Shoe<span class="text-sky-400">savior</span>
          </span>
        </a>

        <div class="hidden md:flex items-center space-x-2">
          <a href="index.html" id="nav-home" data-nav-link class="px-4 py-2 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-white hover:bg-slate-800/30">Beranda</a>
          <a href="layanan.html" id="nav-services" data-nav-link class="px-4 py-2 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-white hover:bg-slate-800/30">Pelayanan</a>
          <a href="dashboard.html" id="nav-dashboard" data-nav-link class="hidden px-4 py-2 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-white hover:bg-slate-800/30">Dashboard</a>
        </div>

        <div class="flex items-center gap-3">
          <button id="login-nav-btn" onclick="goToAdmin()" class="text-sm font-semibold text-slate-300 hover:text-white bg-slate-800/60 px-4 py-2 rounded-xl transition-all border border-slate-700/50 hover:border-slate-600">
            <i class="fa-solid fa-lock mr-2 text-sky-400"></i>Admin Login
          </button>

          <button id="logout-nav-btn" onclick="handleLogout()" class="hidden text-sm font-semibold text-rose-400 hover:text-rose-300 bg-rose-950/30 px-4 py-2 rounded-xl transition-all border border-rose-900/50">
            <i class="fa-solid fa-right-from-bracket mr-2"></i>Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow">
    <section class="py-12 px-4">
      <div class="max-w-2xl mx-auto">
        <div class="text-center mb-8">
          <span class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold bg-sky-500/10 text-sky-400 border border-sky-500/20 mb-4">
            <i class="fa-solid fa-file-signature"></i> Konfirmasi Customer
          </span>
          <h1 class="text-3xl font-black text-white">Konfirmasi Pesanan</h1>
          <p class="text-sm text-slate-400 mt-2">Periksa detail harga final sebelum menyetujui proses perawatan sepatu.</p>
        </div>

        <div class="glassmorphism rounded-3xl border border-slate-800 shadow-2xl overflow-hidden">
          <div class="p-6 border-b border-slate-800 bg-slate-950/30">
            <h2 class="text-xl font-bold text-white">Detail Pesanan</h2>
            <p class="text-xs text-slate-400 mt-1">Data di bawah berasal dari sistem Shoesavior.</p>
          </div>

          <div id="customerConfirmContent" class="p-6 text-sm text-slate-300">
            Memuat detail pesanan...
          </div>

          <div id="customerConfirmActions" class="hidden p-6 border-t border-slate-800 bg-slate-950/30 flex flex-col sm:flex-row gap-3 justify-end">
            <button id="cancelBtn" onclick="submitCustomerConfirmation('cancel')" class="px-5 py-3 rounded-xl bg-rose-950/50 text-rose-300 border border-rose-900 hover:bg-rose-900/60 font-semibold text-sm">
              <i class="fa-solid fa-xmark mr-1"></i>Batalkan
            </button>

            <button id="approveBtn" onclick="submitCustomerConfirmation('approve')" class="px-5 py-3 rounded-xl bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold text-sm">
              <i class="fa-solid fa-check mr-1"></i>Setuju Pesanan
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-[#070a12] border-t border-slate-900 py-8">
    <div class="max-w-7xl mx-auto px-4 text-center text-sm text-slate-500">
      <p>&copy; 2026 <span class="text-slate-400 font-semibold">Shoesavior</span>. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/konfirmasi.js"></script>
</body>
</html>
